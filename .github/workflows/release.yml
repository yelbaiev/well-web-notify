name: Deploy to WordPress.org

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint PHP files
        run: |
          errors=0
          while IFS= read -r file; do
            output=$(php -l "$file" 2>&1)
            if [ $? -ne 0 ]; then
              echo "$output"
              errors=1
            fi
          done < <(find . -name "*.php" -not -path "./.git/*")
          if [ "$errors" -eq 1 ]; then
            echo "PHP lint failed"
            exit 1
          fi
          echo "PHP lint passed"

  deploy:
    name: Deploy to wp.org SVN
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: WordPress Plugin Deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: wellweb-notify

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Extract the first version block from CHANGELOG.md
          notes=$(awk '/^## Version /{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WellWeb Notify ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: ${{ steps.deploy.outputs.zip-path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
